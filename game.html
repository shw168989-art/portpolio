<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬스터 골드 스타일 MBTI 검사</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gb-dark: #202020;
            --gb-light: #ffffff;
            --gb-bg: #efefef;
            --pkm-blue: #5878b0;
            --pkm-red: #d04038;
            --pkm-green: #48a058;
            --border-outer: #404040;
            --border-inner: #c0c0c0;
        }

        body {
            background-color: #333;
            color: var(--gb-dark);
            font-family: 'Press Start 2P', cursive, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--gb-bg);
            border: 8px solid var(--border-outer);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Home Button (Top Left) */
        #home-link {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            background-color: var(--pkm-red);
            color: white;
            border: 3px solid var(--gb-dark);
            padding: 8px 10px;
            font-size: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        #home-link:hover {
            background-color: #ff5f56;
            transform: scale(1.05);
        }

        #home-link:active {
            transform: scale(0.95);
        }

        /* Top Screen Area */
        #screen {
            height: 300px;
            background-color: #88c070; /* Classic GB Greenish tint */
            border-bottom: 6px solid var(--border-outer);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .sprite {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
        }

        /* Message Box */
        #dialogue-box {
            height: 150px;
            background-color: var(--gb-light);
            border: 4px solid var(--gb-dark);
            margin: 10px;
            padding: 15px;
            position: relative;
            box-sizing: border-box;
        }

        #dialogue-text {
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
            margin: 0;
        }

        .cursor {
            position: absolute;
            bottom: 10px;
            right: 15px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid var(--gb-dark);
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Controls */
        #controls {
            padding: 10px 20px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 10px;
            border: 4px solid var(--gb-dark);
            background-color: #e0e0e0;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.1s;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: #fff;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            background-color: #bbb;
        }

        button.full-width {
            grid-column: span 2;
        }

        button.port-btn {
            background-color: #5878b0;
            color: #fff;
            border-color: #101010;
        }

        /* Results Display */
        .hidden {
            display: none !important;
        }

        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .title-text {
            font-size: 18px;
            color: var(--pkm-red);
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 8px;
            color: #333;
        }

        .result-pkm {
            font-size: 14px;
            margin-top: 10px;
            color: #000;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            #game-container {
                border-width: 4px;
            }
            #screen {
                height: 240px;
            }
            #dialogue-text {
                font-size: 12px;
            }
            button {
                font-size: 8px;
            }
            #home-link {
                padding: 5px 7px;
                font-size: 6px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Top Left Home Button -->
    <a href="https://shw168989-art.github.io/portpolio/" target="_blank" id="home-link">HOME</a>

    <div id="screen">
        <div id="intro-content">
            <div class="title-text">POKEMON MBTI</div>
            <div class="subtitle">GOLD VERSION</div>
            <div class="sprite">🎓</div>
        </div>
        <div id="game-content" class="hidden">
            <div id="sprite-display" class="sprite">❓</div>
            <div id="question-counter" style="font-size: 10px; margin-top: 10px;">QUESTION 1/12</div>
        </div>
        <div id="result-content" class="hidden">
            <div id="result-type" class="title-text">INTJ</div>
            <div id="result-sprite" class="sprite">🐲</div>
            <div id="result-pkm-name" class="result-pkm">당신은 '망나뇽' 타입!</div>
        </div>
    </div>

    <div id="dialogue-box">
        <p id="dialogue-text">포켓몬 세상에 온 것을 환영한다! 나는 오키드 박사라고 하네.</p>
        <div class="cursor" id="dialogue-cursor"></div>
    </div>

    <div id="controls">
        <!-- Initial Start Button -->
        <button id="btn-start" class="full-width" onclick="startGame()">모험을 시작한다 (START)</button>
        
        <!-- Game Choice Buttons -->
        <button id="btn-opt1" class="hidden" onclick="handleChoice(0)">그렇다</button>
        <button id="btn-opt2" class="hidden" onclick="handleChoice(1)">아니다</button>

        <!-- Portfolio Link Button -->
        <button id="btn-portfolio" class="full-width port-btn" onclick="openPortfolio()">포트폴리오 이동 (LINK)</button>

        <!-- Restart Button (Visible at result only) -->
        <button id="btn-restart" class="hidden full-width" onclick="restartTest()">테스트 다시하기</button>
    </div>
</div>

<script>
    const questions = [
        { q: "모르는 사람에게 먼저 인사를 건네는 편인가?", type: "EI", icon: "👋" },
        { q: "주말에는 밖으로 나가는 게 에너지가 생기나?", type: "EI", icon: "🏙️" },
        { q: "여러 명이 모인 파티를 즐기는 편인가?", type: "EI", icon: "🎊" },
        { q: "상상보다는 현실적인 사실을 더 믿는 편인가?", type: "SN", icon: "📊" },
        { q: "포켓몬 기술을 쓸 때 명중률 수치를 중요시하나?", type: "SN", icon: "🎯" },
        { q: "일기를 쓸 때 구체적인 행동 위주로 적는가?", type: "SN", icon: "✍️" },
        { q: "친구의 고민을 들으면 해결책부터 생각나는가?", type: "TF", icon: "💡" },
        { q: "감정적인 위로보다는 논리적인 조언이 도움되나?", type: "TF", icon: "⚖️" },
        { q: "게임에서 이기는 것이 즐기는 것보다 중요한가?", type: "TF", icon: "🏆" },
        { q: "여행을 가기 전 시간 단위로 계획을 세우는가?", type: "JP", icon: "📅" },
        { q: "방 정리가 항상 깔끔하게 되어 있는 편인가?", type: "JP", icon: "🧹" },
        { q: "정해진 규칙을 따르는 것이 마음이 편한가?", type: "JP", icon: "📜" }
    ];

    const pokemonResults = {
        "ISTJ": { name: "강철톤", icon: "🐍", desc: "성실하고 규칙을 중시하는 타입!" },
        "ISFJ": { name: "메가니움", icon: "🌸", desc: "차분하고 주변을 잘 돌보는 타입!" },
        "INFJ": { name: "뮤", icon: "✨", desc: "신비롭고 통찰력이 뛰어난 타입!" },
        "INTJ": { name: "뮤츠", icon: "🧬", desc: "전략적이고 독립적인 천재 타입!" },
        "ISTP": { name: "텅구리", icon: "🦴", desc: "과묵하지만 도구 활용이 능숙한 타입!" },
        "ISFP": { name: "루브도", icon: "🎨", desc: "예술적 감각이 풍부한 평화주의자!" },
        "INFP": { name: "토게피", icon: "🐣", desc: "상상력이 풍부하고 마음이 따뜻한 타입!" },
        "INTP": { name: "후딘", icon: "🥄", desc: "분석적이고 호기심이 많은 지식인 타입!" },
        "ESTP": { name: "괴력몬", icon: "💪", desc: "활동적이며 에너지가 넘치는 실천가!" },
        "ESFP": { name: "피카츄", icon: "⚡", desc: "어디서나 인기 만점인 분위기 메이커!" },
        "ENFP": { name: "이브이", icon: "🦊", desc: "가능성이 무궁무진하고 사교적인 타입!" },
        "ENTP": { name: "팬텀", icon: "👻", desc: "재치 있고 고정관념을 깨는 타입!" },
        "ESTJ": { name: "윈디", icon: "🐕", desc: "책임감이 강하고 리더십이 있는 타입!" },
        "ESFJ": { name: "해피너스", icon: "🥚", desc: "사람들을 돕는 것을 좋아하는 따뜻한 리더!" },
        "ENFJ": { name: "칠색조", icon: "🐦", desc: "이상적이며 사람들을 이끄는 카리스마!" },
        "ENTJ": { name: "망나뇽", icon: "🐲", desc: "자신감 넘치고 목표를 꼭 달성하는 타입!" }
    };

    let currentStep = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    const dialogueText = document.getElementById('dialogue-text');
    const introContent = document.getElementById('intro-content');
    const gameContent = document.getElementById('game-content');
    const resultContent = document.getElementById('result-content');
    const spriteDisplay = document.getElementById('sprite-display');
    const qCounter = document.getElementById('question-counter');

    const btnStart = document.getElementById('btn-start');
    const btnOpt1 = document.getElementById('btn-opt1');
    const btnOpt2 = document.getElementById('btn-opt2');
    const btnRestart = document.getElementById('btn-restart');

    function startGame() {
        currentStep = 0;
        scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        introContent.classList.add('hidden');
        btnStart.classList.add('hidden');
        gameContent.classList.remove('hidden');
        btnOpt1.classList.remove('hidden');
        btnOpt2.classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentStep < questions.length) {
            const q = questions[currentStep];
            dialogueText.innerText = q.q;
            spriteDisplay.innerText = q.icon;
            qCounter.innerText = `QUESTION ${currentStep + 1}/${questions.length}`;
        } else {
            showResult();
        }
    }

    function handleChoice(choiceIdx) {
        const q = questions[currentStep];
        const typePair = q.type;
        
        if (choiceIdx === 0) {
            scores[typePair[0]]++;
        } else {
            scores[typePair[1]]++;
        }

        currentStep++;
        showQuestion();
    }

    function showResult() {
        gameContent.classList.add('hidden');
        btnOpt1.classList.add('hidden');
        btnOpt2.classList.add('hidden');
        resultContent.classList.remove('hidden');
        btnRestart.classList.remove('hidden');

        const mbti = 
            (scores.E >= scores.I ? "E" : "I") +
            (scores.S >= scores.N ? "S" : "N") +
            (scores.T >= scores.F ? "T" : "F") +
            (scores.J >= scores.P ? "J" : "P");

        const result = pokemonResults[mbti];
        
        document.getElementById('result-type').innerText = mbti;
        document.getElementById('result-sprite').innerText = result.icon;
        document.getElementById('result-pkm-name').innerText = `당신은 '${result.name}' 타입!`;
        dialogueText.innerText = `결과가 나왔군! ${result.desc} 자, 이제 모험을 떠나게!`;
    }

    function restartTest() {
        resultContent.classList.add('hidden');
        btnRestart.classList.add('hidden');
        startGame();
    }

    function openPortfolio() {
        window.open('https://github.com/shw168989-art/portpolio/', '_blank');
    }
</script>

</body>
</html>
